name: Publish Package

on:
  push:
    branches:
      - main
    paths-ignore: # Prevents the "bump version" commit from re-triggering this action
      - 'package.json'
      - 'package-lock.json'
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a Personal Access Token (PAT) if you want the "Push changes" 
          # step to trigger other workflows (like tests).
          persist-credentials: true
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sanmugamks'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version and Push
        # Only bump version if we are on main, not on a release tag
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          npm version patch -m "chore: bump version to %s [skip ci]"
          git push --follow-tags
          
      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
